spring.application.name=API
spring.profiles.active=local

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

cloud.aws.region.static=sa-east-1
server.port=8080

# Region-based shipping (frete) rates in BRL, keyed by CEP macro-region
shipping.rate.sudeste=15.00
shipping.rate.sul=20.00
shipping.rate.centro-oeste=25.00
shipping.rate.norte-nordeste=30.00

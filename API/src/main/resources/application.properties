spring.application.name=API

//database
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# For an instance of this project, update is enough.
# it's change for validade with some migration tool like FlyWay
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


mercadopago.access.token=${MP_ACCESS_TOKEN}
jwt.secret.key=${JWT_SECRET_KEY}


cloud.aws.credential.access-key=${AWS_ACCESS_KEY}
cloud.aws.credential.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=sa-east-1

server.port=8080

## For the adminSeeder
email.admin=${EMAIL_ADMIN}
password.admin=${PASSWORD_ADMIN}
